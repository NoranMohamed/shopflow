name: ShopFlow Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build tag and push image
        id: image
        run: |
          IMAGE_URI=${{ secrets.ECR_URI }}:${{ github.sha }}
          docker build -t $IMAGE_URI ./app
          docker push $IMAGE_URI
          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="ecr_image_uri=${{ needs.build-and-push.outputs.image_uri }}" \
            -var="db_password=${{ secrets.TF_VAR_db_password }}" \
            -var="ec2_public_key=${{ secrets.EC2_PUBLIC_KEY }}" \
            -out=tfplan
        working-directory: terraform

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production
    steps:
      - run: echo "Approved — proceeding with deploy"

  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build-and-push, approve]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Smoke test
        run: |
          echo "Waiting for ALB to stabilize..."
          sleep 30
          curl --fail http://shopflow-alb-1290382372.eu-west-1.elb.amazonaws.com || exit 1
          echo "Smoke test passed!"
